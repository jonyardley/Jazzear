name: CI

on:
  push:
    branches: [main]
  # No branch filter: stacked PRs (target = feature branch) need CI too —
  # otherwise they sit at "no checks reported" until rebased onto main.
  pull_request:
  # Weekly + manual full run: surfaces new RUSTSEC advisories between PRs
  # (deny job) and runs gitleaks' full-history scan (see the gitleaks job).
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

# Cancel superseded runs on PRs; let every main run finish.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Third-party actions are SHA-pinned (tag-move compromise of an action in the
# required gate = arbitrary code with the workflow token). Dependabot's
# github-actions ecosystem maintains these pins.

jobs:
  # Path filter: the macOS job is 10×-billed — skip it on PRs that can't
  # affect the app (docs-only, dependabot actions bumps). Non-PR events
  # (push/schedule/dispatch) always run everything; ci-ok verifies a skip
  # was legitimately filtered, so this can't hide a real failure.
  changes:
    name: Path changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            ios:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/**'
              - 'ios/**'
              - 'scripts/ios-run-sim.sh'
              - 'justfile'
              - '.github/workflows/ci.yml'

  docs:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Broken relative links + merge-conflict markers; same script as
      # `just links` so local and CI can't drift.
      - run: python3 .github/scripts/check_doc_links.py

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # rustup reads rust-toolchain.toml (pinned version + components)
      - run: rustup toolchain install
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          # --all-features is the action's default `arguments`; keep it when
          # adding --locked or feature coverage silently drops.
          arguments: --all-features --locked

  # Direct gitleaks CLI, not gitleaks-action@v2: the action scans only the
  # first 30 PR commits (gitleaks/gitleaks-action#187), and with squash-only
  # merges a transient secret in commit 31+ would never be scanned anywhere
  # while staying fetchable via refs/pull/N/head. PRs scan the full webhook
  # base..head range — the only moment the whole commit chain is reachable;
  # push/schedule/dispatch runs scan the full history.
  gitleaks:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # Version-pinned tool download; dependabot won't bump this — check
        # https://github.com/gitleaks/gitleaks/releases when touching it.
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --redact -v --exit-code=1 \
              --log-opts="--no-merges --first-parent ${BASE_SHA}..${HEAD_SHA}"
          else
            gitleaks detect --redact -v --exit-code=1
          fi

  # Bindings are gitignored build output, regenerated here from the PR's core
  # every run (the cache key is a pure function of everything the output
  # depends on) — staleness is impossible by construction, which is the
  # "bindings freshness" gate mvp-plan M0 asks for.
  ios:
    name: iOS (bindings + build)
    runs-on: macos-26
    timeout-minutes: 40
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.5"
      # rustup reads rust-toolchain.toml (pinned version + iOS targets)
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "ios"
          cache-on-failure: true
      - name: Install just + xcodegen
        run: brew install just xcodegen
      - name: Cache cargo-swift
        id: cargo-swift-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-swift
          key: cargo-swift-0.9.0-${{ runner.os }}-${{ runner.arch }}
      - name: Install cargo-swift
        if: steps.cargo-swift-cache.outputs.cache-hit != 'true'
        # Must stay in lockstep with the uniffi pin in crates/changes-ffi
        # (a skew is a runtime crash; lib.rs asserts the uniffi side).
        run: cargo install cargo-swift --version "=0.9.0" --locked
      # Content-addressed: key covers every input the generated bindings
      # depend on, so a hit is byte-equivalent to regenerating.
      - name: Cache generated Swift bindings
        id: bindings-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/generated
          key: ios-bindings-cargoswift-0.9.0-${{ runner.os }}-${{ hashFiles('crates/changes-core/src/**', 'crates/changes-ffi/src/**', 'crates/changes-core/Cargo.toml', 'crates/changes-ffi/Cargo.toml', 'Cargo.lock') }}
      - name: Regenerate Swift bindings (facet typegen + cargo-swift)
        if: steps.bindings-cache.outputs.cache-hit != 'true'
        run: just ios-gen
      - name: Cache SwiftPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/build/spm
          key: ios-spm-v1-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: |
            ios-spm-v1-${{ runner.os }}-
      # Split restore/save: only main writes this cache; PRs restore main's
      # DerivedData (which already holds the compiled deps) and skip the
      # write. (NOT `save-if:` — that input belongs to rust-cache; on
      # actions/cache it is silently ignored.)
      - name: Restore iOS DerivedData
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/build/dd
          key: ios-dd-v1-${{ runner.os }}-${{ hashFiles('ios/project.yml', 'ios/Changes/**') }}
          restore-keys: |
            ios-dd-v1-${{ runner.os }}-
      # Builds the app + test bundle and runs ChangesTests (store round-trip
      # + migration upgrade tests) on a dedicated simulator.
      - name: Build + test (simulator)
        run: just ios-test
      - name: Save iOS DerivedData (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/build/dd
          key: ios-dd-v1-${{ runner.os }}-${{ hashFiles('ios/project.yml', 'ios/Changes/**') }}
      # Boot-through-the-FFI smoke + a visual artifact per merge: the build
      # proves linking; launching proves the bridge loads and renders.
      - name: Launch on simulator + screenshot
        if: github.event_name == 'push'
        run: REUSE_BUILD=1 bash scripts/ios-run-sim.sh "$GITHUB_WORKSPACE/ios-screenshots/changes.png"
      - name: Upload screenshot
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-screenshot
          path: ios-screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # ── The one required status check ──────────────────────────────────────
  # Branch protection requires exactly this job ("CI OK") and nothing else.
  # When adding jobs, list them in `needs` — protection never changes.
  # `ios` is the one job allowed to skip, and ONLY when the path filter
  # says the PR can't affect it — a skip for any other reason still fails.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [changes, docs, fmt, clippy, test, deny, gitleaks, ios]
    if: always()
    steps:
      - name: All needed jobs succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
          IOS_FILTERED: ${{ github.event_name == 'pull_request' && needs.changes.outputs.ios != 'true' }}
        run: |
          echo "$RESULTS" | jq -e '
            to_entries | map(select(.key != "ios"))
            | all(.value.result == "success")
          ' >/dev/null || { echo '::error::a required job failed, was cancelled, or was skipped'; exit 1; }
          ios=$(echo "$RESULTS" | jq -r '.ios.result')
          if [ "$ios" != "success" ] && ! { [ "$ios" = "skipped" ] && [ "$IOS_FILTERED" = "true" ]; }; then
            echo "::error::ios result=$ios and the skip was not a legitimate path filter"; exit 1
          fi
