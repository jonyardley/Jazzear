name: CI

on:
  push:
    branches: [main]
  # No branch filter: stacked PRs (target = feature branch) need CI too —
  # otherwise they sit at "no checks reported" until rebased onto main.
  pull_request:

# Cancel superseded runs on PRs; let every main run finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  docs:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No merge-conflict markers
        run: |
          if grep -rn --include='*.md' -E '^(<{7} |>{7} )' .; then
            echo 'Merge-conflict markers found'; exit 1
          fi
      - name: Internal doc links resolve
        run: python3 .github/scripts/check_doc_links.py

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup reads rust-toolchain.toml (pinned version + components)
      - run: rustup toolchain install
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  gitleaks:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── The one required status check ──────────────────────────────────────
  # Branch protection requires exactly this job ("CI OK") and nothing else.
  # When adding jobs, list them in `needs` — protection never changes.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [docs, fmt, clippy, test, deny, gitleaks]
    if: always()
    steps:
      - name: All needed jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo 'A required job failed, was cancelled, or was skipped'; exit 1
          fi
