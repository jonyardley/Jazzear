name: CI

on:
  push:
    branches: [main]
  # No branch filter: stacked PRs (target = feature branch) need CI too —
  # otherwise they sit at "no checks reported" until rebased onto main.
  pull_request:
  # Weekly + manual full run: surfaces new RUSTSEC advisories between PRs
  # (deny job) and runs gitleaks' full-history scan (see the gitleaks job).
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

# Cancel superseded runs on PRs; let every main run finish.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Third-party actions are SHA-pinned (tag-move compromise of an action in the
# required gate = arbitrary code with the workflow token). Dependabot's
# github-actions ecosystem maintains these pins.

jobs:
  docs:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Broken relative links + merge-conflict markers; same script as
      # `just links` so local and CI can't drift.
      - run: python3 .github/scripts/check_doc_links.py

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # rustup reads rust-toolchain.toml (pinned version + components)
      - run: rustup toolchain install
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          # --all-features is the action's default `arguments`; keep it when
          # adding --locked or feature coverage silently drops.
          arguments: --all-features --locked

  # Direct gitleaks CLI, not gitleaks-action@v2: the action scans only the
  # first 30 PR commits (gitleaks/gitleaks-action#187), and with squash-only
  # merges a transient secret in commit 31+ would never be scanned anywhere
  # while staying fetchable via refs/pull/N/head. PRs scan the full webhook
  # base..head range — the only moment the whole commit chain is reachable;
  # push/schedule/dispatch runs scan the full history.
  gitleaks:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # Version-pinned tool download; dependabot won't bump this — check
        # https://github.com/gitleaks/gitleaks/releases when touching it.
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --redact -v --exit-code=1 \
              --log-opts="--no-merges --first-parent ${BASE_SHA}..${HEAD_SHA}"
          else
            gitleaks detect --redact -v --exit-code=1
          fi

  # Bindings are gitignored build output, regenerated here from the PR's core
  # every run (the cache key is a pure function of everything the output
  # depends on) — staleness is impossible by construction, which is the
  # "bindings freshness" gate mvp-plan M0 asks for.
  ios:
    name: iOS (bindings + build)
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.5"
      # rustup reads rust-toolchain.toml (pinned version + iOS targets)
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "ios"
          cache-on-failure: true
      - name: Install just + xcodegen
        run: brew install just xcodegen
      - name: Cache cargo-swift
        id: cargo-swift-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-swift
          key: cargo-swift-0.9.0-${{ runner.os }}-${{ runner.arch }}
      - name: Install cargo-swift
        if: steps.cargo-swift-cache.outputs.cache-hit != 'true'
        # Must stay in lockstep with the uniffi pin in crates/changes-ffi
        # (a skew is a runtime crash; lib.rs asserts the uniffi side).
        run: cargo install cargo-swift --version "=0.9.0" --locked
      # Content-addressed: key covers every input the generated bindings
      # depend on, so a hit is byte-equivalent to regenerating.
      - name: Cache generated Swift bindings
        id: bindings-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/generated
          key: ios-bindings-cargoswift-0.9.0-${{ runner.os }}-${{ hashFiles('crates/changes-core/src/**', 'crates/changes-ffi/src/**', 'crates/changes-core/Cargo.toml', 'crates/changes-ffi/Cargo.toml', 'Cargo.lock') }}
      - name: Regenerate Swift bindings (facet typegen + cargo-swift)
        if: steps.bindings-cache.outputs.cache-hit != 'true'
        run: just ios-gen
      - name: Cache SwiftPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ios/build/spm
          key: ios-spm-v1-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: |
            ios-spm-v1-${{ runner.os }}-
      - name: Build the app (simulator)
        run: just ios-build

  # ── The one required status check ──────────────────────────────────────
  # Branch protection requires exactly this job ("CI OK") and nothing else.
  # When adding jobs, list them in `needs` — protection never changes.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [docs, fmt, clippy, test, deny, gitleaks, ios]
    if: always()
    steps:
      - name: All needed jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo 'A required job failed, was cancelled, or was skipped'; exit 1
          fi
