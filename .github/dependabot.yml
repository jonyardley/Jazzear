version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    # crux crates are a matched set; skewed single-crate bumps break trait
    # bounds (intrada #970). facet must track what crux_core resolves.
    groups:
      crux:
        patterns:
          - "crux*"
    ignore:
      # facet must track whatever crux_core resolves (typegen reflection).
      # It becomes a direct dep at M0-iOS: derive its workspace pin then
      # from `cargo tree -i facet`; never let dependabot bump it solo.
      - dependency-name: "facet"
      - dependency-name: "facet-*"
      # bincode 1.x mirrors crux_core's bridge serializer — the round-trip
      # tests must match the real FFI wire format. Major bumps (2.x/3.x)
      # break both the API and the format; revisit when crux migrates.
      - dependency-name: "bincode"
        update-types: ["version-update:semver-major"]
      # uniffi is exact-pinned to match cargo-swift 0.9.0's bundled bindgen
      # (intrada #966/#968); bump the pair by hand, in lockstep, never solo.
      - dependency-name: "uniffi"
      - dependency-name: "uniffi-*"
      - dependency-name: "uniffi_*"
