# Pinned for reproducible local + CI builds; bump deliberately (it's not
# dependabot-managed). Cargo.toml's rust-version mirrors the strictest
# dependency MSRV (currently crux_core at 1.90), not an independently
# verified floor; this pin is the version everything actually builds with.
[toolchain]
channel = "1.93.1"
components = ["rustfmt", "clippy"]
# iOS device + simulator std, for cargo-swift packaging (just ios-gen).
targets = ["aarch64-apple-ios", "aarch64-apple-ios-sim"]
