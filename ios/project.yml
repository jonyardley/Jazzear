name: Changes
options:
  bundleIdPrefix: com.changes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "9S5FG4LQAF"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  ChangesCoreFFI:
    path: generated/ChangesCoreFFI # local, gitignored — from `just ios-gen`
  SharedTypes:
    path: generated/SharedTypes # local, gitignored — from facet typegen
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.11.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    exactVersion: "1.19.2"

targets:
  Changes:
    type: application
    platform: iOS
    sources:
      - path: Changes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.changes.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    dependencies:
      - package: ChangesCoreFFI
        product: ChangesCoreFFI
      - package: SharedTypes
        product: SharedTypes
      - package: GRDB
        product: GRDB
    scheme:
      testTargets:
        - ChangesTests

  ChangesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChangesTests
        excludes:
          - "__Snapshots__/**" # read from disk via #file, not bundled
    dependencies:
      - target: Changes
      - package: SharedTypes
        product: SharedTypes
      - package: GRDB
        product: GRDB
      - package: SnapshotTesting
        product: SnapshotTesting
