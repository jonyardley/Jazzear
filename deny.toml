# cargo-deny: supply-chain gates (licenses, advisories, sources, dupes).
# Run locally with `just deny`; CI runs it on every PR.

[graph]
all-features = true

[licenses]
# Changes is a paid, closed-source app: permissive licenses only. No copyleft
# (GPL/AGPL/LGPL/MPL) without an explicit, recorded decision. The bundled
# fonts' SIL OFL lives outside cargo and is handled by shipped notices.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.9
# Our own unpublished crates carry no license field (proprietary).
private = { ignore = true }

[advisories]
yanked = "deny"
ignore = [
    # bincode 1.x is unmaintained, but it IS crux_core 0.19's bridge
    # serializer (cargo tree: crux_core -> bincode 1.3.3); our dev-dep
    # mirrors the real wire format for round-trip tests. Drop this ignore
    # when crux migrates off bincode 1.
    { id = "RUSTSEC-2025-0141", reason = "crux_core 0.19 bridge serializer; dev-dep mirrors the wire format" },
    # Transitive build-time proc macro via crux_macros; upstream announced
    # no safe upgrade exists. Compile-time only, not in the shipped binary.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error via crux_macros; build-time only, no upgrade path" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path deps (changes-core <- changes-ffi) carry no version and are
# private; wildcards stay denied for real registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
